<!DOCTYPE html>
<html lang="en" x-data="{ darkMode: localStorage.getItem('darkMode') !== 'false' }" :class="{ 'dark': darkMode }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - Built By Bean</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' },
                        surface: { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 700: '#334155', 800: '#1e293b', 900: '#0f172a', 950: '#020617' }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .mesh-bg { background-color: #020617; background-image: radial-gradient(at 40% 20%, rgba(59, 130, 246, 0.15) 0px, transparent 50%); }
        .input-ring { border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); transition: all 0.2s ease; background: rgba(15,23,42,0.5); color: #f1f5f9; }
        .input-ring:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.25); }
    </style>
</head>
<body class="mesh-bg min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-brand-400 to-brand-600 shadow-lg mb-4">
                <span class="text-white font-bold text-xl">BBB</span>
            </div>
            <h1 class="text-2xl font-bold text-white">Set New Password</h1>
            <p class="text-surface-400 text-sm mt-1">You must change your password before continuing.</p>
        </div>

        <div class="bg-surface-900/60 backdrop-blur-xl rounded-2xl border border-white/8 shadow-xl p-8">
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="mb-4 px-4 py-3 rounded-xl text-sm
                        {% if category == 'error' %}bg-red-50 text-red-700 dark:bg-red-900/20 dark:text-red-400
                        {% else %}bg-brand-900/20 text-brand-400{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-surface-300 mb-1.5">New Password</label>
                    <input type="password" name="new_password" required minlength="6"
                           class="input-ring w-full px-4 py-2.5 text-sm placeholder-surface-500"
                           placeholder="At least 6 characters">
                </div>
                <div>
                    <label class="block text-sm font-medium text-surface-300 mb-1.5">Confirm Password</label>
                    <input type="password" name="confirm_password" required
                           class="input-ring w-full px-4 py-2.5 text-sm placeholder-surface-500"
                           placeholder="Repeat new password">
                </div>
                <button type="submit"
                        class="w-full py-2.5 px-4 bg-gradient-to-r from-brand-500 to-brand-600 hover:from-brand-600 hover:to-brand-700 text-white font-medium rounded-xl shadow-lg transition-all duration-200">
                    Update Password
                </button>
            </form>
        </div>
    </div>
</body>
</html>
