<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Pluralism Within</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('pluralism.static', filename='css/graph.css') }}">
</head>
<body>
<div id="app">
    <header id="pg-header">
        <h1>The Pluralism Within</h1>
        <p class="subtitle">Tracing the Fractures of Christendom</p>
    </header>

    <div class="pg-stage">
        <aside class="pg-sidebar" aria-label="Filters">
            <div class="pg-sidebar-section-title">Tradition Families</div>
            <div class="pg-kind-chips" id="pg_kind_chips" role="group" aria-label="Filter by family"></div>

            <div class="pg-sidebar-section-title">View</div>
            <label class="pg-toggle">
                <input type="checkbox" id="pg_extinct_toggle">
                <span>Extinct only</span>
            </label>
            <button class="pg-toggle" type="button" id="pg_gear_btn"
                    aria-label="Tune forces" title="Tune forces / display">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor"
                     stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1.1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"></path>
                </svg>
                <span>Tune</span>
            </button>
        </aside>

        <div class="pg-search-row">
            <div class="pg-search-box">
                <span class="pg-search-label">From</span>
                <input type="search" class="pg-search" id="pg_search_a"
                       placeholder="Roman Catholicism · Methodism · 1517"
                       autocomplete="off" spellcheck="false"
                       aria-label="Search FROM">
                <div class="pg-typeahead" id="pg_ta_a" role="listbox" hidden></div>
            </div>
            <div class="pg-search-arrow" aria-hidden="true">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor"
                     stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="14 7 19 12 14 17"></polyline>
                </svg>
            </div>
            <div class="pg-search-box">
                <span class="pg-search-label">To <span class="pg-search-label-hint">(optional)</span></span>
                <input type="search" class="pg-search" id="pg_search_b"
                       placeholder="Pentecostalism · Mormonism…"
                       autocomplete="off" spellcheck="false"
                       aria-label="Search TO">
                <div class="pg-typeahead" id="pg_ta_b" role="listbox" hidden></div>
            </div>
        </div>

        <canvas id="pg_canvas" class="pg-canvas"></canvas>
        <div class="pg-meta" id="pg_meta">Loading graph…</div>

        <aside class="pg-gear" id="pg_gear" aria-hidden="true">
            <div class="pg-gear-head">
                <span>Tune</span>
                <button class="pg-gear-close" type="button" aria-label="Close" id="pg_gear_close">&times;</button>
            </div>
            <div class="pg-gear-section-title">Display</div>
            <label class="pg-slider">
                <span>Node size</span>
                <input type="range" id="pg_s_node" min="0.4" max="2.5" step="0.05" value="1">
            </label>
            <label class="pg-slider">
                <span>Link thickness</span>
                <input type="range" id="pg_s_link_w" min="0.3" max="3" step="0.1" value="0.7">
            </label>
            <label class="pg-slider">
                <span>Text fade threshold</span>
                <input type="range" id="pg_s_label_zoom" min="0.4" max="3" step="0.05" value="1.2">
            </label>
            <div class="pg-gear-section-title">Forces</div>
            <label class="pg-slider">
                <span>Center force</span>
                <input type="range" id="pg_f_center" min="0" max="1" step="0.02" value="0.18">
            </label>
            <label class="pg-slider">
                <span>Repel force</span>
                <input type="range" id="pg_f_charge" min="-700" max="-30" step="10" value="-280">
            </label>
            <label class="pg-slider">
                <span>Link force</span>
                <input type="range" id="pg_f_link" min="0" max="1" step="0.02" value="0.4">
            </label>
            <label class="pg-slider">
                <span>Link distance</span>
                <input type="range" id="pg_f_distance" min="20" max="220" step="2" value="80">
            </label>
            <button class="pg-gear-reset" type="button" id="pg_gear_reset">Restore defaults</button>
        </aside>

        <aside class="pg-side" id="pg_side" aria-live="polite"></aside>
    </div>
</div>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="{{ url_for('pluralism.static', filename='js/graph.js') }}"></script>
</body>
</html>
