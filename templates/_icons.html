{#
  Lucide line-icon set as Jinja macros. Each macro returns an inline <svg>.
  Usage: {% import '_icons.html' as icons %} then {{ icons.wallet() }}.
  SVGs inherit color via currentColor and size via the parent container
  (width/height are 1em so font-size on the wrapper controls the size).
#}

{% macro _svg(paths) -%}
<svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24"
     fill="none" stroke="currentColor" stroke-width="1.75"
     stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
  {{ paths|safe }}
</svg>
{%- endmacro %}
