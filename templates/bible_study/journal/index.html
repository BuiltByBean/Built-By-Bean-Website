{% extends "bible_study/base.html" %}
{% block page_title %}Journal{% endblock %}
{% block content %}
<div class="h-full overflow-y-auto custom-scrollbar" x-data="journalPage()" x-init="init()">
    <div class="p-4 md:p-6 max-w-3xl mx-auto">
        <h2 class="text-xl font-bold text-surface-900 dark:text-white mb-4">Journal</h2>

        <!-- New entry -->
        <div class="glass-card p-4 mb-6">
            <input spellcheck="true" x-model="newTitle" type="text" placeholder="Title (optional)" class="w-full px-3 py-2 text-sm font-medium bg-transparent border-none focus:outline-none text-surface-800 dark:text-white placeholder-surface-400 mb-1">
            <textarea spellcheck="true" autocomplete="off" x-model="newBody" x-ref="newTextarea"
                      @input="autoGrow($refs.newTextarea)"
                      rows="2" placeholder="What's on your heart today?"
                      class="w-full px-3 py-2 text-sm bg-transparent border-none focus:outline-none text-surface-700 dark:text-surface-300 resize-none placeholder-surface-400 overflow-hidden"></textarea>
            <div class="flex items-center justify-between pt-3 border-t border-surface-200/50 dark:border-white/5">
                <div class="flex items-center gap-2">
                    <div class="relative" x-data="{ open: false }" @click.outside="open = false" @keydown.escape.window="open = false">
                        <button @click="open = !open" class="flex items-center gap-1.5 text-xs bg-surface-100 dark:bg-white/5 rounded-lg pl-2.5 pr-2 py-1.5 text-surface-500 hover:text-surface-700 dark:hover:text-surface-300 transition-colors">
                            <template x-if="newTypeId && types.find(t => String(t.id) === String(newTypeId))">
                                <span class="w-2 h-2 rounded-full" :style="'background:' + types.find(t => String(t.id) === String(newTypeId))?.color"></span>
                            </template>
                            <span x-text="newTypeId ? types.find(t => String(t.id) === String(newTypeId))?.name || 'Type' : 'Type'"></span>
                            <svg :class="{ 'rotate-180': open }" class="w-3 h-3 transition-transform" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/></svg>
                        </button>
                        <div x-show="open" x-cloak x-transition:enter="transition ease-out duration-100" x-transition:enter-start="opacity-0 translate-y-1" x-transition:enter-end="opacity-100 translate-y-0" x-transition:leave="transition ease-in duration-75" x-transition:leave-start="opacity-100 translate-y-0" x-transition:leave-end="opacity-0 translate-y-1"
                             class="absolute z-50 bottom-full mb-1.5 left-0 min-w-[180px] bg-white dark:bg-surface-800 rounded-xl shadow-xl border border-gray-200 dark:border-white/10 overflow-y-auto max-h-64 py-1">
                            <button @click="newTypeId = ''; open = false" class="w-full text-left px-3 py-2 text-xs transition-colors" :class="!newTypeId ? 'font-semibold text-brand-600 dark:text-brand-400 bg-brand-50/50 dark:bg-brand-500/5' : 'text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-white/[0.05]'">No type</button>
                            <template x-for="t in types" :key="t.id">
                                <button @click="newTypeId = String(t.id); open = false" class="w-full text-left px-3 py-2 text-xs transition-colors flex items-center gap-2" :class="String(newTypeId) === String(t.id) ? 'font-semibold text-brand-600 dark:text-brand-400 bg-brand-50/50 dark:bg-brand-500/5' : 'text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-white/[0.05]'">
                                    <span class="w-2 h-2 rounded-full flex-shrink-0" :style="'background:' + t.color"></span>
                                    <span x-text="t.name"></span>
                                </button>
                            </template>
                            <div class="border-t border-gray-100 dark:border-white/5 mt-1 pt-1">
                                <button @click="showTypeCreate = true; open = false" class="w-full text-left px-3 py-2 text-xs text-brand-600 dark:text-brand-400">+ New type</button>
                            </div>
                        </div>
                    </div>
                </div>
                <button @click="addEntry()" :disabled="!newBody.trim()" class="px-4 py-1.5 bg-brand-600 hover:bg-brand-700 text-white text-xs font-medium rounded-lg disabled:opacity-30 transition-colors min-h-[36px]">Save</button>
            </div>
        </div>

        <!-- Create type -->
        <div x-show="showTypeCreate" x-cloak x-transition class="glass-card p-4 mb-4">
            <p class="text-xs font-medium text-surface-500 uppercase tracking-wider mb-2">New Journal Type</p>
            <div class="flex gap-2">
                <input x-model="newTypeName" placeholder="e.g. Prayer, Reflection" class="flex-1 px-3 py-2 text-sm bg-surface-50 dark:bg-surface-800 border border-surface-200 dark:border-white/10 rounded-lg input-ring">
                <input x-model="newTypeColor" type="color" value="#6366f1" class="w-10 h-10 rounded-lg border border-surface-200 dark:border-white/10 cursor-pointer">
            </div>
            <div class="flex gap-2 mt-2">
                <button @click="createType()" class="px-4 py-2 bg-brand-600 text-white text-xs font-medium rounded-lg hover:bg-brand-700 min-h-[36px]">Create</button>
                <button @click="showTypeCreate = false" class="px-4 py-2 text-xs text-surface-500 bg-surface-100 dark:bg-white/5 rounded-lg min-h-[36px]">Cancel</button>
            </div>
        </div>

        <!-- Edit type -->
        <div x-show="editingType" x-cloak x-transition class="glass-card p-4 mb-4">
            <p class="text-xs font-medium text-surface-500 uppercase tracking-wider mb-2">Edit Type</p>
            <div class="flex gap-2">
                <input x-model="editTypeName" class="flex-1 px-3 py-2 text-sm bg-surface-50 dark:bg-surface-800 border border-surface-200 dark:border-white/10 rounded-lg input-ring">
                <input x-model="editTypeColor" type="color" class="w-10 h-10 rounded-lg border border-surface-200 dark:border-white/10 cursor-pointer">
            </div>
            <div class="flex gap-2 mt-2">
                <button @click="saveTypeEdit()" class="px-4 py-2 bg-brand-600 text-white text-xs font-medium rounded-lg hover:bg-brand-700 min-h-[36px]">Save</button>
                <button @click="deleteType(editingType)" class="px-4 py-2 text-xs text-red-500 bg-red-50 dark:bg-red-500/10 rounded-lg min-h-[36px]">Delete</button>
                <button @click="editingType = null" class="px-4 py-2 text-xs text-surface-500 bg-surface-100 dark:bg-white/5 rounded-lg min-h-[36px]">Cancel</button>
            </div>
        </div>

        <!-- Search + filter -->
        <div class="flex items-center gap-2 mb-3">
            <div class="flex-1 relative">
                <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-surface-400" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/></svg>
                <input x-model="search" @input.debounce.200ms type="text" placeholder="Search..." class="w-full pl-9 pr-3 py-2 text-sm bg-surface-50 dark:bg-surface-800 border border-surface-200 dark:border-white/10 rounded-lg input-ring">
            </div>
            <div class="relative" x-data="{ open: false }" @click.outside="open = false" @keydown.escape.window="open = false">
                <button @click="open = !open" class="flex items-center justify-between gap-2 text-sm bg-surface-50 dark:bg-surface-800 border border-surface-200 dark:border-white/10 rounded-lg pl-3.5 pr-3 py-2 text-surface-600 dark:text-surface-300 hover:border-surface-300 dark:hover:border-white/20 transition-all cursor-pointer w-[160px]">
                    <span class="text-sm" x-text="filterType ? types.find(t => String(t.id) === String(filterType))?.name || 'All types' : 'All types'"></span>
                    <svg :class="{ 'rotate-180': open }" class="w-4 h-4 text-surface-400 transition-transform" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/></svg>
                </button>
                <div x-show="open" x-cloak x-transition:enter="transition ease-out duration-100" x-transition:enter-start="opacity-0 translate-y-1" x-transition:enter-end="opacity-100 translate-y-0" x-transition:leave="transition ease-in duration-75" x-transition:leave-start="opacity-100 translate-y-0" x-transition:leave-end="opacity-0 translate-y-1"
                     class="absolute z-50 top-full mt-1.5 right-0 min-w-[160px] bg-white dark:bg-surface-800 rounded-xl shadow-xl border border-gray-200 dark:border-white/10 overflow-y-auto max-h-64 py-1">
                    <button @click="filterType = ''; open = false" class="w-full text-left px-3 py-2 text-xs transition-colors" :class="!filterType ? 'font-semibold text-brand-600 dark:text-brand-400 bg-brand-50/50 dark:bg-brand-500/5' : 'text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-white/[0.05]'">All types</button>
                    <template x-for="t in types" :key="t.id">
                        <div class="flex items-center">
                            <button @click="filterType = String(t.id); open = false" class="flex-1 text-left px-3 py-2 text-xs transition-colors flex items-center gap-2" :class="String(filterType) === String(t.id) ? 'font-semibold text-brand-600 dark:text-brand-400 bg-brand-50/50 dark:bg-brand-500/5' : 'text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-white/[0.05]'">
                                <span class="w-2 h-2 rounded-full flex-shrink-0" :style="'background:' + t.color"></span>
                                <span x-text="t.name"></span>
                            </button>
                            <button @click="startEditType(t); open = false" class="px-2 py-1 text-surface-400 hover:text-brand-500" title="Edit type">
                                <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 112.652 2.652L6.832 19.82a4.5 4.5 0 01-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 011.13-1.897L16.863 4.487z"/></svg>
                            </button>
                        </div>
                    </template>
                </div>
            </div>
        </div>

        <!-- Entries grouped by date -->
        <template x-for="group in grouped" :key="group.date">
            <div class="mb-4">
                <button @click="group.open = !group.open" class="w-full flex items-center justify-between px-3 py-2 rounded-lg bg-surface-100 dark:bg-white/5 min-h-[40px]">
                    <span class="text-sm font-bold text-surface-900 dark:text-white" x-text="group.date"></span>
                    <span class="text-[10px] text-surface-400" x-text="group.entries.length"></span>
                </button>
                <div x-show="group.open" x-cloak class="mt-2 space-y-2">
                    <template x-for="e in group.entries" :key="e.id">
                        <div class="glass-card p-3">
                            <!-- View mode -->
                            <div x-show="editingEntry !== e.id">
                                <div class="flex items-start justify-between gap-2">
                                    <div class="flex-1 min-w-0">
                                        <div class="flex items-center gap-2 mb-1">
                                            <span x-show="e.type_name" class="inline-flex items-center gap-1 text-[10px] font-medium px-1.5 py-0.5 rounded-full" :style="'background:' + (e.type_color || '#6366f1') + '15; color:' + (e.type_color || '#6366f1')">
                                                <span class="w-1.5 h-1.5 rounded-full" :style="'background:' + (e.type_color || '#6366f1')"></span>
                                                <span x-text="e.type_name"></span>
                                            </span>
                                        </div>
                                        <p x-show="e.title" class="text-sm font-semibold text-surface-900 dark:text-white mb-0.5" x-text="e.title"></p>
                                        <p class="text-sm text-surface-700 dark:text-surface-300 whitespace-pre-wrap" x-text="e.body"></p>
                                    </div>
                                    <div class="flex items-center gap-1 flex-shrink-0">
                                        <button @click="startEditEntry(e)" class="p-1.5 text-surface-400 hover:text-brand-500 rounded-lg transition-colors" title="Edit">
                                            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 112.652 2.652L6.832 19.82a4.5 4.5 0 01-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 011.13-1.897L16.863 4.487z"/></svg>
                                        </button>
                                        <button @click="removeEntry(e.id)" class="p-1.5 text-surface-400 hover:text-red-500 rounded-lg transition-colors" title="Delete">
                                            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0"/></svg>
                                        </button>
                                    </div>
                                </div>
                            </div>
                            <!-- Edit mode -->
                            <div x-show="editingEntry === e.id" x-cloak>
                                <input spellcheck="true" x-model="editEntryTitle" placeholder="Title (optional)" class="w-full px-2 py-1.5 text-sm font-medium bg-surface-50 dark:bg-surface-800 border border-surface-200 dark:border-white/10 rounded-lg input-ring mb-2">
                                <textarea spellcheck="true" autocomplete="off" x-model="editEntryBody" x-ref="editTextarea"
                                          @input="autoGrow($event.target)"
                                          class="w-full px-2 py-1.5 text-sm bg-surface-50 dark:bg-surface-800 border border-surface-200 dark:border-white/10 rounded-lg input-ring resize-none overflow-hidden mb-2" rows="3"></textarea>
                                <div class="flex items-center gap-2">
                                    <!-- Type selector for edit -->
                                    <div class="relative" x-data="{ open: false }" @click.outside="open = false">
                                        <button @click="open = !open" class="flex items-center gap-1.5 text-xs bg-surface-100 dark:bg-white/5 rounded-lg pl-2.5 pr-2 py-1.5 text-surface-500">
                                            <template x-if="editEntryTypeId && types.find(t => String(t.id) === String(editEntryTypeId))">
                                                <span class="w-2 h-2 rounded-full" :style="'background:' + types.find(t => String(t.id) === String(editEntryTypeId))?.color"></span>
                                            </template>
                                            <span x-text="editEntryTypeId ? types.find(t => String(t.id) === String(editEntryTypeId))?.name || 'Type' : 'No type'"></span>
                                        </button>
                                        <div x-show="open" x-cloak x-transition class="absolute z-50 bottom-full mb-1 left-0 min-w-[140px] bg-white dark:bg-surface-800 rounded-xl shadow-xl border border-gray-200 dark:border-white/10 py-1">
                                            <button @click="editEntryTypeId = ''; open = false" class="w-full text-left px-3 py-1.5 text-xs text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-white/[0.05]">No type</button>
                                            <template x-for="t in types" :key="t.id">
                                                <button @click="editEntryTypeId = String(t.id); open = false" class="w-full text-left px-3 py-1.5 text-xs flex items-center gap-2 text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-white/[0.05]">
                                                    <span class="w-2 h-2 rounded-full" :style="'background:' + t.color"></span>
                                                    <span x-text="t.name"></span>
                                                </button>
                                            </template>
                                        </div>
                                    </div>
                                    <div class="flex-1"></div>
                                    <button @click="saveEntryEdit(e.id)" class="px-3 py-1.5 bg-brand-600 text-white text-xs rounded-lg hover:bg-brand-700 min-h-[32px]">Save</button>
                                    <button @click="editingEntry = null" class="px-3 py-1.5 text-xs text-surface-500 bg-surface-100 dark:bg-white/5 rounded-lg min-h-[32px]">Cancel</button>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </template>
        <p x-show="grouped.length === 0 && !loading" class="text-sm text-surface-400 italic text-center py-8">No journal entries yet.</p>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
function journalPage() {
    return {
        entries: [], types: [], search: '', filterType: '',
        newBody: '', newTitle: '', newTypeId: '', loading: true,
        showTypeCreate: false, newTypeName: '', newTypeColor: '#6366f1',
        editingType: null, editTypeName: '', editTypeColor: '',
        editingEntry: null, editEntryTitle: '', editEntryBody: '', editEntryTypeId: '',

        async init() {
            const [er, tr] = await Promise.all([fetch('/Bible-Study/api/journal'), fetch('/Bible-Study/api/journal/types')]);
            this.entries = await er.json();
            this.types = await tr.json();
            this.loading = false;
        },

        autoGrow(el) {
            el.style.height = 'auto';
            el.style.height = el.scrollHeight + 'px';
        },

        get filtered() {
            let list = this.entries;
            if (this.filterType) list = list.filter(e => String(e.type_id) === String(this.filterType));
            if (this.search) {
                const s = this.search.toLowerCase();
                list = list.filter(e => e.body.toLowerCase().includes(s) || (e.title || '').toLowerCase().includes(s));
            }
            return list;
        },

        get grouped() {
            const map = {};
            for (const e of this.filtered) {
                const d = e.date || 'Unknown';
                if (!map[d]) map[d] = { date: d, entries: [], open: true };
                map[d].entries.push(e);
            }
            return Object.values(map);
        },

        async createType() {
            if (!this.newTypeName.trim()) return;
            await fetch('/Bible-Study/api/journal/types', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ name: this.newTypeName, color: this.newTypeColor }) });
            this.newTypeName = ''; this.showTypeCreate = false;
            await this.init();
        },

        startEditType(t) {
            this.editingType = t.id;
            this.editTypeName = t.name;
            this.editTypeColor = t.color;
        },

        async saveTypeEdit() {
            if (!this.editTypeName.trim()) return;
            await fetch('/Bible-Study/api/journal/types/' + this.editingType, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ name: this.editTypeName, color: this.editTypeColor }) });
            this.editingType = null;
            await this.init();
        },

        async deleteType(tid) {
            await fetch('/Bible-Study/api/journal/types/' + tid, { method: 'DELETE' });
            this.editingType = null;
            await this.init();
        },

        async addEntry() {
            if (!this.newBody.trim()) return;
            await fetch('/Bible-Study/api/journal', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ body: this.newBody, title: this.newTitle, type_id: this.newTypeId || null }) });
            this.newBody = ''; this.newTitle = '';
            await this.init();
        },

        startEditEntry(e) {
            this.editingEntry = e.id;
            this.editEntryTitle = e.title || '';
            this.editEntryBody = e.body;
            this.editEntryTypeId = e.type_id ? String(e.type_id) : '';
            this.$nextTick(() => {
                const ta = this.$refs.editTextarea;
                if (ta) this.autoGrow(ta);
            });
        },

        async saveEntryEdit(eid) {
            await fetch('/Bible-Study/api/journal/' + eid, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ title: this.editEntryTitle, body: this.editEntryBody, type_id: this.editEntryTypeId || null }) });
            this.editingEntry = null;
            await this.init();
        },

        async removeEntry(id) {
            await fetch('/Bible-Study/api/journal/' + id, { method: 'DELETE' });
            await this.init();
        },
    }
}
</script>
{% endblock %}
