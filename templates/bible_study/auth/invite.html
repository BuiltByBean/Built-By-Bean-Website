<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Set Up Your Account — Bible Study Notes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['Inter','system-ui','sans-serif']},colors:{brand:{500:'#6366f1',600:'#4f46e5',700:'#4338ca',950:'#1e1b4b'},surface:{50:'#f8fafc',800:'#1e293b',900:'#0f172a',950:'#020617'}}}}}</script>
</head>
<body class="font-sans bg-gradient-to-br from-brand-950 via-surface-900 to-surface-950 min-h-screen flex items-center justify-center antialiased p-4">
    <div class="w-full max-w-sm">
        <div class="bg-surface-800/60 border border-white/10 rounded-2xl p-6 sm:p-8 backdrop-blur-sm shadow-2xl">
            <div class="text-center mb-6">
                <div class="w-12 h-12 rounded-xl bg-brand-600 flex items-center justify-center mx-auto mb-3">
                    <svg class="w-7 h-7 text-white" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25"/></svg>
                </div>
                <h1 class="text-xl font-bold text-white">Welcome!</h1>
                <p class="text-sm text-gray-400 mt-1">Set up your Bible Study account</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}{% for category, message in messages %}
            <div class="mb-4 px-3 py-2 rounded-lg text-sm bg-red-500/10 text-red-400 border border-red-500/20">{{ message }}</div>
            {% endfor %}{% endif %}
            {% endwith %}

            <form method="POST" action="/Bible-Study/invite/{{ token }}" class="space-y-4">
                <div>
                    <label class="text-[10px] font-semibold text-gray-400 uppercase tracking-widest block mb-1.5">Your Name</label>
                    <input name="display_name" value="{{ user.display_name or '' }}" class="w-full px-3 py-3 bg-surface-900 border border-white/10 rounded-lg text-sm text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-brand-500/30 focus:border-brand-500" placeholder="Your full name" autofocus>
                </div>
                <div>
                    <label class="text-[10px] font-semibold text-gray-400 uppercase tracking-widest block mb-1.5">Username</label>
                    <input name="username" value="{{ user.username }}" class="w-full px-3 py-3 bg-surface-900 border border-white/10 rounded-lg text-sm text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-brand-500/30 focus:border-brand-500" placeholder="Choose a username">
                </div>
                <div>
                    <label class="text-[10px] font-semibold text-gray-400 uppercase tracking-widest block mb-1.5">Password</label>
                    <input name="password" type="password" class="w-full px-3 py-3 bg-surface-900 border border-white/10 rounded-lg text-sm text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-brand-500/30 focus:border-brand-500" placeholder="Min 6 characters">
                </div>
                <button type="submit" class="w-full py-3 bg-gradient-to-r from-brand-600 to-brand-500 text-white font-medium rounded-lg hover:from-brand-700 hover:to-brand-600 transition-all shadow-lg shadow-brand-500/20">
                    Set Up Account
                </button>
            </form>
        </div>
    </div>
</body>
</html>
