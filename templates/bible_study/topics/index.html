{% extends "bible_study/base.html" %}
{% block page_title %}Topics{% endblock %}
{% block content %}
<div class="h-full overflow-y-auto custom-scrollbar" x-data="topicsPage()" x-init="init()">
    <div class="p-4 md:p-6 max-w-3xl mx-auto">
        <div class="flex items-center justify-between mb-4">
            <div>
                <h2 class="text-xl font-bold text-surface-900 dark:text-white">Topics</h2>
                <p class="text-sm text-surface-500">Write about biblical topics with inline scripture references.</p>
            </div>
            <button @click="showCreate = !showCreate" class="p-2.5 rounded-lg bg-brand-600 text-white hover:bg-brand-700 min-h-[44px]">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
            </button>
        </div>

        <!-- Create form -->
        <div x-show="showCreate" x-cloak x-transition class="glass-card p-4 mb-4">
            <input x-model="newTitle" type="text" placeholder="Topic title (e.g. Salvation, Prayer, End Times)" class="w-full px-3 py-2.5 text-sm bg-surface-50 dark:bg-surface-800 border border-surface-200 dark:border-white/10 rounded-lg input-ring mb-2">
            <button @click="createTopic()" :disabled="!newTitle.trim()" class="w-full py-2.5 bg-brand-600 hover:bg-brand-700 text-white text-xs font-medium rounded-lg disabled:opacity-50 min-h-[44px]">Create Topic</button>
        </div>

        <!-- Search -->
        <input x-model="search" @input.debounce.200ms type="text" placeholder="Search topics..."
               class="w-full px-4 py-3 text-sm bg-surface-50 dark:bg-surface-800 border border-surface-200 dark:border-white/10 rounded-xl input-ring mb-4">

        <!-- Topic cards -->
        <div class="space-y-3">
            <template x-for="t in filtered" :key="t.id">
                <a :href="'/Bible-Study/topics/' + t.id" class="glass-card p-4 block hover:border-brand-500/30 transition-colors">
                    <h3 class="text-sm font-bold text-surface-900 dark:text-white" x-text="t.title"></h3>
                    <p class="text-xs text-surface-500 mt-1" x-text="t.snippet || 'No content yet...'"></p>
                    <span class="text-[10px] text-surface-400 mt-2 block" x-text="formatDate(t.updated_at)"></span>
                </a>
            </template>
        </div>
        <p x-show="!loading && filtered.length === 0" class="text-sm text-surface-400 italic text-center py-8">No topics yet.</p>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
function topicsPage() {
    return {
        topics: [], search: '', newTitle: '', showCreate: false, loading: true,
        async init() { this.topics = await (await fetch('/Bible-Study/api/topics')).json(); this.loading = false; },
        get filtered() {
            if (!this.search) return this.topics;
            const s = this.search.toLowerCase();
            return this.topics.filter(t => t.title.toLowerCase().includes(s) || (t.snippet||'').toLowerCase().includes(s));
        },
        async createTopic() {
            if (!this.newTitle.trim()) return;
            const r = await fetch('/Bible-Study/api/topics', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ title: this.newTitle }) });
            const t = await r.json();
            if (t.id) window.location.href = '/Bible-Study/topics/' + t.id;
        },
        formatDate(iso) { return iso ? new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : ''; },
    }
}
</script>
{% endblock %}
